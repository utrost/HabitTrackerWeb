<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stoic Uwe</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d1a;--card:#15152d;--card2:#1a1a35;--border:#222248;--text:#e0e0f0;--muted:#6870a0;--accent:#6c5ce7;--accent2:#5a4bd6;--green:#2ecc71;--green2:rgba(46,204,113,.15);--red:#e74c3c;--red2:rgba(231,76,60,.15);--yellow:#f39c12;--yellow2:rgba(243,156,18,.15);--blue:#3498db;--blue2:rgba(52,152,219,.15);--radius:14px}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;-webkit-font-smoothing:antialiased;user-select:none}

/* HEADER */
.hdr{padding:1.2rem 1rem .6rem;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.hdr h1{font-size:1.15rem;font-weight:700;letter-spacing:-.4px}
.hdr h1 span{color:var(--accent)}
.hdr .sub{color:var(--muted);font-size:.7rem;margin-top:.2rem}
.stats{display:flex;gap:.5rem;justify-content:center;margin-top:.6rem}
.st{text-align:center;background:var(--card);padding:.35rem .55rem;border-radius:10px;min-width:64px}
.st .n{font-size:1.05rem;font-weight:700}
.st .l{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}

/* WEEK */
.wk{display:flex;gap:3px;margin:.6rem .8rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.wk::-webkit-scrollbar{display:none}
.wd{flex:0 0 calc((100% - 18px)/7);background:var(--card);border-radius:10px;padding:.3rem .1rem;text-align:center;font-size:.5rem;color:var(--muted);min-width:38px}
.wd .dot{width:7px;height:7px;border-radius:50%;margin:2px auto;background:var(--border)}
.wd .dot.ok{background:var(--green)}
.wd .dot.part{background:var(--yellow)}
.wd .dot.miss{background:var(--red);opacity:.3}
.wd.now{background:var(--accent);color:#fff}
.wd.now .dot{background:rgba(255,255,255,.35)}

/* PAGES */
.pg{display:none;padding:.8rem}
.pg.on{display:block}

/* HABIT CARD */
.hc{background:var(--card);border-radius:var(--radius);padding:.7rem .7rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.6rem}
.hi{font-size:1.5rem;width:2.2rem;text-align:center;flex-shrink:0}
.hn{font-weight:600;font-size:.9rem;margin-bottom:.15rem}
.hd{font-size:.68rem;color:var(--muted)}
.hsk{font-size:.65rem;color:var(--yellow);margin-top:.15rem}

/* Boolean toggle */
.tog{width:52px;height:30px;border-radius:15px;border:2px solid var(--border);background:var(--bg);position:relative;cursor:pointer;flex-shrink:0;transition:all .2s}
.tog::after{content:'';position:absolute;width:24px;height:24px;border-radius:12px;background:var(--muted);top:1px;left:1px;transition:all .2s}
.tog.on{border-color:var(--green);background:var(--green2)}
.tog.on::after{background:var(--green);left:25px}

/* Number input */
.nr{display:flex;align-items:center;gap:.3rem;flex-shrink:0}
.ni{width:60px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:.3rem;font-size:.85rem;text-align:center;outline:none;-moz-appearance:textfield}
.ni::-webkit-inner-spin-button,.ni::-webkit-outer-spin-button{-webkit-appearance:none}
.ni:focus{border-color:var(--accent)}
.nb{width:38px;height:30px;border-radius:8px;border:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nb.m{background:var(--red2);color:var(--red)}
.nb.p{background:var(--green2);color:var(--green)}
.nb:active{transform:scale(.9)}
.ns{width:30px;height:30px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.85rem;cursor:pointer}

/* Quick buttons */
.qb{display:flex;gap:.25rem;margin-top:.25rem;flex-wrap:wrap}
.qbb{padding:.2rem .45rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:.62rem;cursor:pointer;white-space:nowrap}
.qbb:active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* FAB */
.fab{position:fixed;bottom:78px;right:16px;width:50px;height:50px;border-radius:25px;background:var(--accent);color:#fff;font-size:1.6rem;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(108,92,231,.45);display:flex;align-items:center;justify-content:center;z-index:90;transition:transform .15s}
.fab:active{transform:scale(.88)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.show{display:flex}
.md{background:var(--card);border-radius:16px 16px 0 0;padding:1.2rem 1rem 2rem;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.md h3{margin-bottom:.8rem;font-size:1.05rem}
.md label{display:block;font-size:.7rem;color:var(--muted);margin-bottom:.2rem;margin-top:.6rem}
.md input,.md select{width:100%;padding:.5rem .6rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;outline:none}
.md input:focus,.md select:focus{border-color:var(--accent)}
.ma{display:flex;gap:.5rem;margin-top:1rem}
.ma button{flex:1;padding:.6rem;border-radius:8px;border:none;font-size:.9rem;font-weight:600;cursor:pointer}
.ma .bc{background:var(--bg);color:var(--muted)}
.ma .bs{background:var(--accent);color:#fff}

/* BOTTOM NAV */
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;padding:.45rem 0 .3rem;cursor:pointer;color:var(--muted);font-size:.55rem;border:none;background:none}
.nv.on{color:var(--accent)}
.nv .ni2{font-size:1.25rem;margin-bottom:.15rem}
.nv:active .ni2{transform:scale(1.15)}

/* WEIGHt */
.wbc{background:var(--card);border-radius:var(--radius);padding:1rem;text-align:center;margin-bottom:.8rem}
.wbg{font-size:2.5rem;font-weight:700}
.wtr{font-size:.85rem;margin-top:.2rem}
.wtr.up{color:var(--red)}.wtr.dn{color:var(--green)}.wtr.sm{color:var(--muted)}
.wir{display:flex;gap:.4rem;justify-content:center;margin-top:.6rem}
.wi{width:90px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:.5rem;text-align:center;font-size:1.2rem;outline:none;-moz-appearance:textfield}
.wi::-webkit-inner-spin-button,.wi::-webkit-outer-spin-button{-webkit-appearance:none}
.wi:focus{border-color:var(--accent)}
.wsv{padding:.5rem 1.2rem;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer}
canvas{width:100%;height:180px;background:var(--card);border-radius:var(--radius);margin-top:.8rem;padding:.5rem}

/* JOURNAL */
.je{background:var(--card);border-radius:var(--radius);padding:.7rem .8rem;margin-bottom:.5rem}
.jd{font-size:.65rem;color:var(--muted);font-weight:600;margin-bottom:.3rem}
.jt{font-size:.85rem;line-height:1.5;word-break:break-word}
.ji{width:100%;min-height:80px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:.6rem;font-size:.9rem;resize:none;outline:none;font-family:inherit;margin-bottom:.5rem}
.ji:focus{border-color:var(--accent)}

/* HISTORY */
.hh{background:var(--card);border-radius:var(--radius);padding:.6rem .8rem;margin-bottom:.5rem}
.hh .hh1{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.dots{display:flex;gap:2px;flex-wrap:wrap}
.dots .dt{width:10px;height:10px;border-radius:2px;background:var(--border);transition:background .1s}
.dots .dt.ok{background:var(--green)}
.dots .dt.vl{background:var(--blue)}

/* FILL RATE */
.fr{display:flex;align-items:center;gap:.3rem;margin-top:.3rem}
.fr-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.fr-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.fr-txt{font-size:.6rem;color:var(--muted);min-width:30px;text-align:right}

/* EMPTY */
.emp{text-align:center;padding:3rem 1rem;color:var(--muted)}
.emp .ei{font-size:2.5rem;margin-bottom:.5rem;opacity:.5}
.emp .et{font-size:.85rem;line-height:1.4}

/* DELETE */
.del{background:var(--red2);color:var(--red);border:none;border-radius:6px;padding:.3rem .5rem;font-size:.75rem;cursor:pointer;flex-shrink:0}
.del:active{background:var(--red);color:#fff}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);padding:.45rem 1rem;border-radius:10px;font-size:.78rem;font-weight:500;z-index:300;transition:transform .3s ease;background:var(--green2);color:var(--green);border:1px solid var(--green)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* WEIGHT HISTORY ROW */
.whr{display:flex;justify-content:space-between;padding:.5rem .8rem;border-bottom:1px solid var(--border);font-size:.8rem}
.whd{color:var(--muted);flex-shrink:0;width:80px}
.whv{flex:1}

/* HEATMAP (T-0816) */
.hm-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:1rem;background:var(--card);border-radius:var(--radius);padding:.6rem}
.hm-wrap::-webkit-scrollbar{display:none}
.hm-title{font-size:.8rem;font-weight:600;margin-bottom:.5rem;padding-left:.2rem}
.hm{display:grid;gap:2px;font-size:.55rem}
.hm-lbl{font-size:.6rem;color:var(--muted);display:flex;align-items:center;height:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hm-cell{width:11px;height:11px;border-radius:2px;background:var(--border)}
.hm-cell.l1{background:rgba(108,92,231,.3)}.hm-cell.l2{background:rgba(108,92,231,.55)}.hm-cell.l3{background:rgba(108,92,231,.8)}.hm-cell.l4{background:var(--accent)}
.hm-hdr{font-size:.45rem;color:var(--muted);text-align:center;height:11px;line-height:11px}

/* DASHBOARD (T-0818) */
.dash{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.8rem}
.dc{background:var(--card);border-radius:var(--radius);padding:.55rem .65rem}
.dc .dl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.dc .dv{font-size:1.05rem;font-weight:700;margin-top:.12rem}
.dc .dd{font-size:.63rem;color:var(--muted);margin-top:.08rem}
.dc.wide{grid-column:1/-1}
.goal-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:.3rem}
.goal-fill{height:100%;border-radius:3px;transition:width .5s}

/* READ-ONLY MODE (T-0819) */
.ro-badge{display:inline-block;background:var(--yellow2);color:var(--yellow);padding:.15rem .45rem;border-radius:6px;font-size:.6rem}
.hide-ro{display:none!important}

/* GAMIFICATION: XP BAR (T-0823) */
.xp-wrap{margin-top:.5rem;padding:0 .2rem}
.xp-info{display:flex;justify-content:space-between;align-items:center;font-size:.6rem;margin-bottom:.25rem}
.xp-level{font-weight:700;color:var(--accent);font-size:.72rem}
.xp-label{color:var(--muted)}
.xp-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .6s ease}

/* LEVEL-UP OVERLAY (T-0824) */
.lvl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center}
.lvl-overlay.show{display:flex}
.lvl-card{background:var(--card);border:2px solid var(--accent);border-radius:20px;padding:2rem 1.5rem;text-align:center;max-width:320px;width:90%;animation:lvlPop .5s ease}
@keyframes lvlPop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.lvl-card .lvl-icon{font-size:3rem;margin-bottom:.5rem}
.lvl-card .lvl-title{font-size:1.3rem;font-weight:700;color:var(--accent);margin-bottom:.3rem}
.lvl-card .lvl-sub{font-size:.85rem;color:var(--text);margin-bottom:.5rem}
.lvl-card .lvl-msg{font-size:.75rem;color:var(--muted);line-height:1.4}
.lvl-card .lvl-dismiss{margin-top:1rem;padding:.4rem 1.2rem;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.8rem;cursor:pointer}

/* ACHIEVEMENT GALLERY (T-0825) */
.ach-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem}
.ach-card{background:var(--card);border-radius:var(--radius);padding:.7rem;text-align:center;transition:opacity .2s}
.ach-card.locked{opacity:.35}
.ach-icon{font-size:2rem;margin-bottom:.3rem}
.ach-name{font-size:.78rem;font-weight:600;margin-bottom:.15rem}
.ach-desc{font-size:.6rem;color:var(--muted);line-height:1.3}
.ach-date{font-size:.55rem;color:var(--green);margin-top:.2rem}
</style>
</head>
<body>

<div class="hdr">
  <h1>🏛️ Stoic <span>Uwe</span></h1>
  <div class="sub" id="hdrSub">Laden…</div>
  <div class="stats" id="hdrStats"></div>
  <div class="xp-wrap" id="xpWrap"></div>
</div>

<div class="wk" id="wk"></div>

<div class="pg on" id="pgToday" style="padding:.8rem"><div id="pgDash"></div><div id="pgHabits"></div></div>
<div class="pg" id="pgHistory" style="padding:.8rem"><div id="pgHeatmap"></div><div id="pgHistList"></div></div>
<div class="pg" id="pgWeight" style="padding:.8rem"></div>
<div class="pg" id="pgJournal" style="padding:.8rem"></div>
<div class="pg" id="pgAch" style="padding:.8rem"></div>

<!-- LEVEL-UP OVERLAY (T-0824) -->
<div class="lvl-overlay" id="lvlOverlay" onclick="dismissLvl()">
  <div class="lvl-card" onclick="event.stopPropagation()">
    <div class="lvl-icon">🏆</div>
    <div class="lvl-title" id="lvlTitle"></div>
    <div class="lvl-sub" id="lvlSub"></div>
    <div class="lvl-msg" id="lvlMsg"></div>
    <button class="lvl-dismiss" onclick="dismissLvl()">Weiter!</button>
  </div>
</div>

<button class="fab" id="fab">+</button>

<!-- ADD HABIT MODAL -->
<div class="mo" id="addMo" onclick="if(event.target===this)closeMo()">
<div class="md">
  <h3>➕ Neues Habit</h3>
  <label>Name</label>
  <input type="text" id="iLbl" placeholder="z.B. Meditation, Lesen…">
  <div style="display:flex;gap:.5rem">
    <div style="flex:1"><label>Icon</label><input type="text" id="iIco" value="⬜" maxlength="2"></div>
    <div style="flex:1"><label>Einheit</label><input type="text" id="iUnt" placeholder="min,km…"></div>
  </div>
  <label>Typ</label>
  <select id="iTyp">
    <option value="number">Zahl</option>
    <option value="boolean">Ja/Nein</option>
  </select>
  <div class="ma">
    <button class="bc" onclick="closeMo()">Abbrechen</button>
    <button class="bs" onclick="addHabit()">Erstellen</button>
  </div>
</div></div>

<!-- Bottom nav -->
<nav class="bn">
  <button class="nv on" data-pg="pgToday" onclick="nav(this)"><span class="ni2">📋</span>Heute</button>
  <button class="nv" data-pg="pgHistory" onclick="nav(this)"><span class="ni2">📊</span></button>
  <button class="nv" data-pg="pgWeight" onclick="nav(this)"><span class="ni2">⚖️</span></button>
  <button class="nv" data-pg="pgJournal" onclick="nav(this)"><span class="ni2">📓</span></button>
  <button class="nv" data-pg="pgAch" onclick="nav(this)"><span class="ni2">🏅</span></button>
</nav>

<div class="toast" id="toast"></div>

<footer style="text-align:center;padding:1rem .5rem 5rem;color:var(--muted);font-size:.6rem">
  <a href="/dashboard/" style="color:var(--accent);text-decoration:none">📊 Dashboard</a>
</footer>

<script>
const T = new Date().toISOString().slice(0,10);
const DL = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const MNAMES = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
let D = {habits:[],overview:{},goals:{}};
let READONLY = false;

// ── fetch helpers ──
async function apiCall(m,u,b){
  const r = await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

// T-0819: Read-only fallback — compute streak client-side
function _clientStreak(entries){
  const keys=Object.keys(entries).filter(k=>k.length===10).sort();
  if(!keys.length) return 0;
  const td=new Date(T);
  const last=new Date(keys[keys.length-1]);
  if((td-last)/864e5>1.5) return 0;
  let s=1;
  for(let i=keys.length-1;i>0;i--){
    if((new Date(keys[i])-new Date(keys[i-1]))/864e5===1) s++; else break;
  }
  return s;
}

async function fetchFromAPI(){
  const [ov,h,goals] = await Promise.all([
    apiCall('GET','/api/overview'),
    apiCall('GET','/api/habits'),
    apiCall('GET','/api/goals').catch(()=>({}))
  ]);
  D = {habits:h, overview:ov, goals:goals};
}

// T-0819: Fallback to data.json when API is unavailable
async function fetchFromJSON(){
  const r = await fetch('data.json');
  const d = await r.json();
  const habits = d.habits || {};
  const hlist = [];
  for(const [slug, h] of Object.entries(habits)){
    const entries = h.entries || {};
    const streak = _clientStreak(entries);
    hlist.push({
      slug, label:h.label||slug, icon:h.icon||'📋',
      type:h.type||'number', unit:h.unit||'',
      inverted:h.inverted||false, chart:h.chart||false,
      today:entries[T]!=null?entries[T]:null,
      entries, streak, max_streak:streak, total_entries:Object.keys(entries).length
    });
  }
  const gw = habits.gewicht||{};
  const wE = gw.entries||{};
  const weights = Object.entries(wE).filter(([,v])=>typeof v==='number').sort((a,b)=>a[0].localeCompare(b[0]));
  const meta = d.meta||{};
  const todayDone = hlist.filter(h=>h.today!=null).length;
  const total = hlist.length;
  // Find last updated date
  let lastDate = meta.start_date||T;
  for(const h of Object.values(habits)){
    for(const k of Object.keys(h.entries||{})){
      if(k>lastDate) lastDate=k;
    }
  }
  D = {
    habits: hlist,
    overview: {
      habits:hlist, total, today_done:todayDone, today_total:total,
      current_weight:weights.length?weights[weights.length-1][1]:null,
      weight_trend:weights.length>=2?Math.round((weights[weights.length-1][1]-weights[weights.length-2][1])*100)/100:null,
      start_weight:meta.start_weight_kg, target_weight:meta.target_weight_kg,
      completion_rate:{today:total?Math.round(todayDone/total*100):0, week:0, trend:'flat'}
    },
    goals: d.goals||{},
    lastUpdated: lastDate
  };
}

async function refresh(){
  try{
    await fetchFromAPI();
    READONLY = false;
  }catch(e){
    console.warn('API unavailable, trying read-only mode',e);
    try{
      await fetchFromJSON();
      READONLY = true;
    }catch(e2){
      console.error('Cannot load data',e2);
      toast('❌ Daten nicht verfügbar');
      return;
    }
  }
  await fetchGamification();
  render();
}

function render(){
  hdr(); weekRow(); renderToday(); dashboard(); hist(); heatmap(); wgt(); jourList();
  renderXpBar(); checkLevelUp(); renderAchievements();
  // T-0819: hide interactive elements in read-only mode
  if(READONLY){
    document.getElementById('fab').style.display='none';
    document.querySelectorAll('.del,.nr,.qb,.wir,.wsv,.ji').forEach(el=>el.style.display='none');
    document.querySelectorAll('.tog').forEach(el=>{el.style.pointerEvents='none';el.style.opacity='.6';});
  }
}

// ── nav ──
function nav(b){
  document.querySelectorAll('.nv').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  b.classList.add('on');
  document.getElementById(b.dataset.pg).classList.add('on');
}

// ── header ──
function hdr(){
  const o=D.overview;
  const p=o.today_total>0?Math.round(o.today_done/o.today_total*100):0;
  const sub = READONLY
    ? `📖 Nur-Lesen · Aktualisiert: ${D.lastUpdated||'—'}`
    : (p===100?'✨ Alle erledigt!':`${o.today_done}/${o.today_total} heute — ${p}%`);
  document.getElementById('hdrSub').innerHTML = READONLY
    ? `<span class="ro-badge">${sub}</span>`
    : sub;
  const cr = o.completion_rate||{};
  const trendIcon = cr.trend==='up'?'↑':cr.trend==='down'?'↓':'→';
  document.getElementById('hdrStats').innerHTML=`
    <div class="st"><div class="n" style="color:${p>=100?'var(--green)':'var(--accent)'}">${p}%</div><div class="l">Heute</div></div>

// ── T-0818: Weekly Overview Dashboard ──
function dashboard(){
  const o=D.overview;
  const cr=o.completion_rate||{};
  // Compute per-habit weekly completion %
  let best=null,worst=null;
  D.habits.forEach(x=>{
    let done=0;
    for(let i=0;i<7;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const ds=d.toISOString().slice(0,10);
      if(x.entries&&x.entries[ds]!=null) done++;
    }
    const pct=Math.round(done/7*100);
    if(!best||pct>best.pct) best={label:x.label,icon:x.icon,pct};
    if(!worst||pct<worst.pct) worst={label:x.label,icon:x.icon,pct};
  });
  // Streaks summary
  const streaks=D.habits.filter(x=>x.streak>0).sort((a,b)=>b.streak-a.streak);
  const streakTxt=streaks.length?streaks.map(s=>`${s.icon}${s.streak}`).join(' · '):'Keine';
  // Weight progress
  const cw=o.current_weight,sw=o.start_weight,tw=o.target_weight;
  const wProg=sw&&tw&&cw?Math.max(0,Math.min(100,Math.round((sw-cw)/(sw-tw)*100))):0;
  // Goals
  let goalsHtml='';
  if(D.goals&&Object.keys(D.goals).length){
    for(const [slug,g] of Object.entries(D.goals)){
      const pct=g.progress_pct||0;
      const col=pct>=75?'var(--green)':pct>=40?'var(--yellow)':'var(--accent)';
      goalsHtml+=`<div class="dc wide">
        <div class="dl">${g.icon||'🎯'} ${g.label||slug}</div>
        <div class="dv">${pct}%</div>
        <div class="dd">${g.current_value!=null?g.current_value:''} → Ziel: ${g.target} · Noch ${g.remaining!=null?g.remaining:''}</div>
        <div class="goal-bar"><div class="goal-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;
    }
  }
  const trendIcon=cr.trend==='up'?'📈':cr.trend==='down'?'📉':'➡️';
  document.getElementById('pgDash').innerHTML=`<div class="dash">
    <div class="dc"><div class="dl">Beste Woche</div><div class="dv">${best?best.icon+' '+best.pct+'%':'—'}</div><div class="dd">${best?best.label:''}</div></div>
    <div class="dc"><div class="dl">Schwächste</div><div class="dv">${worst?worst.icon+' '+worst.pct+'%':'—'}</div><div class="dd">${worst?worst.label:''}</div></div>
    <div class="dc"><div class="dl">${trendIcon} Wochenrate</div><div class="dv">${cr.week||0}%</div><div class="dd">vs letzte Woche: ${cr.trend==='up'?'besser':cr.trend==='down'?'schlechter':'gleich'}</div></div>
    <div class="dc"><div class="dl">🔥 Streaks</div><div class="dv" style="font-size:.8rem">${streakTxt}</div></div>
    ${cw?`<div class="dc wide"><div class="dl">⚖️ Gewicht-Fortschritt</div><div class="dv">${cw} kg</div><div class="dd">Start: ${sw||'?'} → Ziel: ${tw||'?'} · ${wProg}% erreicht</div><div class="goal-bar"><div class="goal-fill" style="width:${wProg}%;background:${wProg>=50?'var(--green)':'var(--accent)'}"></div></div></div>`:''}
    ${goalsHtml}
  </div>`;
}

function shortcuts(x){
  const u=(x.unit||'').toLowerCase();
  if(u.includes('min')||u.includes('minute')) return [5,10,15,20,30,45,60].map(v=>`<button class="qbb" onclick="qtrk('${x.slug}',${v})">${v}m</button>`).join('');
  if(u.includes('km')) return [1,3,5,10].map(v=>`<button class="qbb" onclick="qtrk('${x.slug}',${v})">${v}</button>`).join('');
  if(u.includes('glas')||u.includes('liter')) return [1,2,3,4,5,6,8].map(v=>`<button class="qbb" onclick="qtrk('${x.slug}',${v})">${v}</button>`).join('');
  if(u.includes('schritt')) return [5000,8000,10000,12000].map(v=>`<button class="qbb" onclick="qtrk('${x.slug}',${v})">${v/1000}k</button>`).join('');
  if(u.includes('kg')||!u) return [0.5,1,1.5,2].map(v=>`<button class="qbb" onclick="qtrk('${x.slug}',${v})">${v}</button>`).join('');
  return '';
}

function heatmap(){
  const el=document.getElementById('pgHeatmap');
  if(!D.habits.length){el.innerHTML='';return;}
  const DAYS=84; // 12 weeks
  const cols=DAYS+1; // +1 for label column
  // Build date array
  const dates=[];
  for(let i=DAYS-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    dates.push(d.toISOString().slice(0,10));
  }
  let h='<div class="hm-title">Heatmap · 12 Wochen</div><div class="hm-wrap"><div class="hm" style="grid-template-columns:70px repeat('+DAYS+',11px)">';
  // Header row with month labels
  h+='<div></div>';
  let lastM='';
  dates.forEach(ds=>{
    const m=MNAMES[parseInt(ds.slice(5,7))-1];
    if(m!==lastM){h+=`<div class="hm-hdr">${m}</div>`;lastM=m;}
    else h+='<div class="hm-hdr"></div>';
  });
  // One row per habit
  D.habits.forEach(x=>{
    const e=x.entries||{};
    h+=`<div class="hm-lbl">${x.icon} ${x.label}</div>`;
    dates.forEach(ds=>{
      const v=e[ds];
      let lvl='';
      if(v!=null){
        if(x.type==='boolean') lvl='l4';
        else{
          // For numeric: intensity based on relative value
          const allVals=Object.values(e).filter(vv=>typeof vv==='number');
          const mx=allVals.length?Math.max(...allVals):1;
          const pct=mx>0?v/mx:0;
          lvl=pct>=.75?'l4':pct>=.5?'l3':pct>=.25?'l2':'l1';
        }
      }
      h+=`<div class="hm-cell ${lvl}" title="${x.label} ${ds}: ${v!=null?v:'—'}"></div>`;
    });
  });
  h+='</div></div>';
  el.innerHTML=h;
}

// T-0817: Weight chart with 7-day moving average
function drawChart(){
  const c=document.getElementById('wChart');
  if(!c||!D.habits)return;
  const gw=D.habits.find(x=>x.slug==='gewicht');
  if(!gw||!gw.entries||!Object.keys(gw.entries).length){
    const ctx2=c.getContext('2d');
    c.width=c.offsetWidth-10;c.height=180;
    ctx2.fillStyle='#6870a0';ctx2.font='13px sans-serif';ctx2.textAlign='center';
    ctx2.fillText('Noch keine Gewichtseinträge',c.width/2,90);
    return;
  }
  const ctx=c.getContext('2d');
  const W=c.offsetWidth-10,H=180;
  c.width=W;c.height=H;
  ctx.clearRect(0,0,W,H);
  const pts=Object.entries(gw.entries).filter(([k,v])=>typeof v==='number').sort((a,b)=>a[0].localeCompare(b[0]));
  const vals=pts.map(p=>p[1]);
  const tw=D.overview.target_weight||82;
  const sw=D.overview.start_weight||vals[0];
  const mn=Math.min(...vals,tw)-1,mx=Math.max(...vals,sw)+1;
  const pad={t:15,b:25,l:40,r:10},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const yOf=v=>pad.t+ch-((v-mn)/(mx-mn))*ch;
  const xOf=i=>pad.l+(i/Math.max(pts.length-1,1))*cw;

  // Grid lines
  ctx.strokeStyle='#222248';ctx.lineWidth=.5;ctx.fillStyle='#6870a0';ctx.font='9px monospace';ctx.textAlign='right';
  for(let v=Math.ceil(mn);v<=Math.floor(mx);v++){const y=yOf(v);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillText(v,pad.l-4,y+3);}

  // Goal line
  const tY=yOf(tw);
  ctx.strokeStyle='#2ecc71';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad.l,tY);ctx.lineTo(W-pad.r,tY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#2ecc71';ctx.font='8px sans-serif';ctx.textAlign='left';ctx.fillText('Ziel: '+tw+'kg',pad.l+2,tY-4);

  // Start line
  if(sw){
    const sY=yOf(sw);
    ctx.strokeStyle='#e74c3c';ctx.lineWidth=.5;ctx.setLineDash([2,3]);ctx.beginPath();ctx.moveTo(pad.l,sY);ctx.lineTo(W-pad.r,sY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#e74c3c';ctx.font='8px sans-serif';ctx.fillText('Start: '+sw+'kg',pad.l+2,sY+10);
  }

  // Raw data line
  ctx.strokeStyle='#3498db';ctx.lineWidth=2;ctx.setLineDash([]);ctx.beginPath();
  pts.forEach((p,i)=>{const x=xOf(i),y=yOf(p[1]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();

  // T-0817: 7-day moving average trendline
  if(pts.length>=3){
    const maWindow=Math.min(7,pts.length);
    ctx.strokeStyle='#f39c12';ctx.lineWidth=2;ctx.setLineDash([6,3]);ctx.beginPath();
    let started=false;
    for(let i=0;i<pts.length;i++){
      const start=Math.max(0,i-maWindow+1);
      const slice=vals.slice(start,i+1);
      const avg=slice.reduce((a,b)=>a+b,0)/slice.length;
      const x=xOf(i),y=yOf(avg);
      if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
    }
    ctx.stroke();ctx.setLineDash([]);
    // Legend
    ctx.fillStyle='#f39c12';ctx.font='7px sans-serif';ctx.textAlign='right';
    ctx.fillText('— Ø7 Tage',W-pad.r,pad.t+8);
  }

  // Data points + labels
  pts.forEach((p,i)=>{const x=xOf(i),y=yOf(p[1]);ctx.fillStyle='#3498db';ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#6870a0';ctx.font='8px sans-serif';ctx.textAlign='center';if(pts.length<=20||i%Math.ceil(pts.length/10)===0||i===pts.length-1){const pa=p[0].split('-');ctx.fillText(pa[2]+'.'+pa[1],x,H-3);}});

  // Delta labels on current value
  if(pts.length){
    const last=vals[vals.length-1];
    const dStart=last-sw;
    const dGoal=last-tw;
    ctx.fillStyle='#e0e0f0';ctx.font='bold 9px sans-serif';ctx.textAlign='right';
    ctx.fillText(`Δ Start: ${dStart>0?'+':''}${dStart.toFixed(1)}  Δ Ziel: ${dGoal>0?'+':''}${dGoal.toFixed(1)}`,W-pad.r,pad.t+20);
  }
}

function wList(){

}

// ── toast ──
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

// ── GAMIFICATION (T-0823/0824/0825) ──
let GAM = null;

async function fetchGamification(){
  if(READONLY) return;
  try{ GAM = await apiCall('GET','/api/gamification'); }catch(e){ GAM=null; }
}

function renderXpBar(){
  const el=document.getElementById('xpWrap');
  if(!GAM){el.innerHTML='';return;}
  const g=GAM;
  el.innerHTML=`
    <div class="xp-info">
      <span class="xp-level">Lvl ${g.level} · ${g.title}</span>
      <span class="xp-label">${g.xp} XP${g.next_level_xp?' · '+g.xp_to_next_level+' bis Lvl '+(g.level+1):' · MAX'}</span>
    </div>
    <div class="xp-bar"><div class="xp-fill" style="width:${g.progress_pct}%"></div></div>`;
}

function checkLevelUp(){
  if(!GAM) return;
  if(GAM.level > GAM.last_seen_level){
    document.getElementById('lvlTitle').textContent='Level '+GAM.level+'!';
    document.getElementById('lvlSub').textContent=GAM.title;
    const msgs=['Weiter so!','Disziplin zahlt sich aus.','Du wirst zur Legende.','Stark. Einfach stark.','Der Stoiker in dir erwacht.'];
    document.getElementById('lvlMsg').textContent=msgs[Math.min(GAM.level-1,msgs.length-1)];
    document.getElementById('lvlOverlay').classList.add('show');
    setTimeout(()=>dismissLvl(),5000);
  }
}

async function dismissLvl(){
  document.getElementById('lvlOverlay').classList.remove('show');
  if(!READONLY){
    try{await apiCall('PUT','/api/gamification/seen');}catch(e){}
  }
}

function renderAchievements(){
  const el=document.getElementById('pgAch');
  if(!GAM||!GAM.achievements){
    el.innerHTML='<div class="emp"><div class="ei">🏅</div><div class="et">Lade Achievements…</div></div>';
    return;
  }
  const earned=GAM.achievements.filter(a=>a.earned);
  const locked=GAM.achievements.filter(a=>!a.earned);
  let h='<div style="font-size:.9rem;font-weight:700;margin-bottom:.6rem">🏅 Achievements <span style="color:var(--muted);font-weight:400;font-size:.7rem">'+earned.length+'/'+GAM.achievements.length+'</span></div>';
  h+='<div class="ach-grid">';
  GAM.achievements.forEach(a=>{
    h+=`<div class="ach-card${a.earned?'':' locked'}">
      <div class="ach-icon">${a.earned?a.icon:'🔒'}</div>
      <div class="ach-name">${a.earned?a.name:'???'}</div>
      <div class="ach-desc">${a.desc}</div>
      ${a.earned?'<div class="ach-date">✅ '+a.earned_date+'</div>':''}
    </div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}

// ── init ──
refresh();
</script>
